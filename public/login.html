<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarDataLive — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <div class="brand">
      <span class="brand-mark"></span>
      <div class="brand-name">
        <div class="name">CarDataLive</div>
        <div class="sub">OBD-II TELEMETRY</div>
      </div>
    </div>

    <div class="login-rule"></div>
    <div class="login-prompt">Access — enter PIN</div>

    <div class="pin-dots" id="pin-dots"></div>

    <div class="keypad" id="keypad"></div>

    <div class="login-hint" id="login-hint">Enter your PIN, then press ⏎</div>
  </main>

  <script>
    const MIN_DOTS = 4;
    const dotsEl = document.getElementById('pin-dots');
    const padEl = document.getElementById('keypad');
    const hintEl = document.getElementById('login-hint');
    let pin = '';
    let busy = false;

    function renderDots() {
      const n = Math.max(MIN_DOTS, pin.length);
      let html = '';
      for (let i = 0; i < n; i++) {
        html += `<span class="pin-dot${i < pin.length ? ' filled' : ''}"></span>`;
      }
      dotsEl.innerHTML = html;
    }

    function setHint(msg, isError) {
      hintEl.textContent = msg;
      hintEl.classList.toggle('error', !!isError);
    }

    // 1-9, then ⌫ · 0 · ⏎
    const keys = ['1','2','3','4','5','6','7','8','9','del','0','ok'];
    padEl.innerHTML = keys.map((k) => {
      const label = k === 'del' ? '⌫' : k === 'ok' ? '⏎' : k;
      return `<button type="button" data-key="${k}">${label}</button>`;
    }).join('');

    function press(k) {
      if (busy) return;
      if (k === 'del') { pin = pin.slice(0, -1); renderDots(); return; }
      if (k === 'ok') { submit(); return; }
      if (/^[0-9]$/.test(k)) {
        if (pin.length >= 12) return;
        pin += k;
        renderDots();
      }
    }

    padEl.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (btn) press(btn.dataset.key);
    });

    window.addEventListener('keydown', (e) => {
      if (/^[0-9]$/.test(e.key)) press(e.key);
      else if (e.key === 'Backspace') press('del');
      else if (e.key === 'Enter') press('ok');
    });

    async function submit() {
      if (busy) return;
      if (!pin) { setHint('Enter your PIN, then press ⏎'); return; }
      busy = true;
      setHint('Checking…');
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin }),
        });
        if (res.ok) {
          window.location.href = '/';
          return;
        }
        const data = await res.json().catch(() => ({}));
        setHint(data.error || 'Incorrect PIN', true);
        pin = '';
        renderDots();
      } catch (err) {
        setHint('Network error', true);
      } finally {
        busy = false;
      }
    }

    renderDots();
  </script>
</body>
</html>
